<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" role="img" aria-labelledby="title desc">
  <title id="title">Stellar Empires</title>
  <desc id="desc">Original Stellar Empires insignia and wordmark.</desc>
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf7ff"/>
      <stop offset="0.38" stop-color="#8fb6ca"/>
      <stop offset="0.7" stop-color="#3e718e"/>
      <stop offset="1" stop-color="#183449"/>
    </linearGradient>
    <linearGradient id="energy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#47c7f1"/>
      <stop offset="0.55" stop-color="#a4ebff"/>
      <stop offset="1" stop-color="#e8ae4b"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#f7fcff"/>
      <stop offset="0.28" stop-color="#8be7ff"/>
      <stop offset="0.72" stop-color="#1e6b8e"/>
      <stop offset="1" stop-color="#06111d"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(18 18)">
