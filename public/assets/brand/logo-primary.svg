    <path d="m102 25 64 38v75l-64 38-64-38V63Z" fill="#081b2b" stroke="#3e718e" stroke-width="2"/>
    <circle cx="102" cy="101" r="38" fill="url(#core)" stroke="#a4ebff" stroke-width="3" filter="url(#glow)"/>
    <path d="M102 48 119 82l37 6-27 26 7 37-34-18-34 18 7-37-27-26 37-6Z" fill="none" stroke="url(#energy)" stroke-width="7" stroke-linejoin="round"/>
    <path d="M17 76h34M153 76h34M17 126h34M153 126h34" stroke="#47c7f1" stroke-width="4" stroke-linecap="round" opacity=".7"/>
  </g>
  <g transform="translate(235 50)">
