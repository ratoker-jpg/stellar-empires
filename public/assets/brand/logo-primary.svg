    <text x="2" y="126" fill="url(#energy)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="51" font-weight="550" letter-spacing="12">EMPIRES</text>
    <path d="M2 146h520" stroke="#3e718e" stroke-width="2"/>
    <path d="M2 146h260" stroke="#47c7f1" stroke-width="3"/>
    <text x="2" y="177" fill="#6f8da0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" letter-spacing="5">GALACTIC COMMAND NETWORK</text>
