<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Контрольный визуальный набор Директората Эгида">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111b"/><stop offset="1" stop-color="#02050a"/></linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#edf3f5"/><stop offset=".35" stop-color="#a9b7c2"/><stop offset=".7" stop-color="#536674"/><stop offset="1" stop-color="#1a2833"/></linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#314452"/><stop offset="1" stop-color="#101a22"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffd98d"/><stop offset="1" stop-color="#b86b22"/></linearGradient>
    <radialGradient id="planet" cx="35%" cy="28%" r="70%"><stop stop-color="#d7ecf3"/><stop offset=".35" stop-color="#557f91"/><stop offset=".68" stop-color="#233845"/><stop offset="1" stop-color="#081019"/></radialGradient>
    <filter id="cyanGlow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity=".7"/></filter>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse"><path d="M80 0H0V80" fill="none" stroke="#3dd4d0" stroke-opacity=".045"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <path d="M0 760 530 420l420 190 650-410v700H0Z" fill="#102332" opacity=".38"/>
  <g fill="none" stroke="#3dd4d0" stroke-opacity=".16"><path d="M40 80h1520M40 820h1520"/><path d="M40 80v740M1560 80v740"/></g>
  <text x="58" y="62" fill="#e7a847" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="700" letter-spacing="7">AEGIS DIRECTORATE · CONTROL SET</text>
  <text x="1542" y="62" text-anchor="end" fill="#6c899a" font-family="Inter,Arial,sans-serif" font-size="14" letter-spacing="3">INDUSTRIAL / ARMORED / LOGISTICS</text>

  <!-- home planet -->
  <g transform="translate(215 250)" filter="url(#shadow)">
    <circle r="125" fill="#3dd4d0" opacity=".08"/>
    <circle r="108" fill="url(#planet)" stroke="#8fb8ca" stroke-width="3"/>
    <path d="M-93-26c45-44 83-55 141-31 23 10 42 28 57 54-39-13-74-13-108 2-32 14-58 33-84 57-13-28-15-56-6-82Z" fill="#6f8f7f" opacity=".72"/>
    <path d="M-82 56c49-6 94 6 139 38-40 27-83 34-125 17-11-17-16-36-14-55Z" fill="#d2c59a" opacity=".58"/>
    <ellipse rx="132" ry="28" fill="none" stroke="#e7a847" stroke-opacity=".45" stroke-width="4" transform="rotate(-14)"/>
    <circle cx="-37" cy="-42" r="15" fill="#f3fbff" opacity=".38"/>
  </g>

  <!-- command building -->
  <g transform="translate(555 270)" filter="url(#shadow)">
    <ellipse cx="0" cy="132" rx="150" ry="34" fill="#000" opacity=".45"/>
    <path d="M-132 84-96-48 0-108 96-48l132 132-57 49H-171Z" fill="url(#dark)" stroke="#7e96a5" stroke-width="4"/>
    <path d="M-76 70-54-25 0-70l54 45 22 95-42 35h-68Z" fill="url(#steel)" stroke="#d9e1e5" stroke-width="3"/>
    <path d="M0-70v175M-54-25l54 32 54-32" fill="none" stroke="#3dd4d0" stroke-width="6" filter="url(#cyanGlow)"/>
    <path d="M-132 84h264M-102 42h204" stroke="#e7a847" stroke-width="5" opacity=".7"/>
    <rect x="-24" y="30" width="48" height="65" rx="6" fill="#07131d" stroke="#3dd4d0" stroke-width="3"/>
  </g>

  <!-- resource building -->
  <g transform="translate(895 260)" filter="url(#shadow)">
    <ellipse cx="0" cy="140" rx="135" ry="31" fill="#000" opacity=".44"/>
    <path d="M-120 102-98-42-40-88h80l58 46 22 144-50 34H-70Z" fill="url(#dark)" stroke="#718896" stroke-width="4"/>
    <path d="M-65 79-54-21-22-52h44l32 31 11 100-34 26h-62Z" fill="#bec9ce" stroke="#eef4f6" stroke-width="3"/>
    <path d="M-34-52 0-88l34 36M-54-21h108M-65 79h130" fill="none" stroke="#e7a847" stroke-width="6"/>
    <circle cy="15" r="25" fill="#0a1c25" stroke="#3dd4d0" stroke-width="5" filter="url(#cyanGlow)"/>
    <path d="M-120 102h240" stroke="#3dd4d0" stroke-opacity=".55" stroke-width="4"/>
  </g>

  <!-- defense -->
  <g transform="translate(1250 270)" filter="url(#shadow)">
    <ellipse cy="130" rx="125" ry="29" fill="#000" opacity=".45"/>
    <path d="M-104 87-78 10-38-38h76l40 48 26 77-48 40h-112Z" fill="url(#dark)" stroke="#8096a3" stroke-width="4"/>
    <rect x="-48" y="-25" width="96" height="78" rx="12" fill="url(#steel)" stroke="#d9e1e5" stroke-width="3"/>
    <path d="M-14-28V-95h28v67" fill="#a9b7c2" stroke="#eaf0f3" stroke-width="3"/>
    <path d="M0-93 92-135l8 17-88 54" fill="url(#steel)" stroke="#d9e1e5" stroke-width="3"/>
    <path d="M-82 82h164M-48 20h96" stroke="#e7a847" stroke-width="5"/>
    <circle cy="18" r="16" fill="#3dd4d0" filter="url(#cyanGlow)"/>
  </g>

  <!-- scout -->
  <g transform="translate(305 635)" filter="url(#shadow)">
    <path d="m-205 25 70-72 130-38 155 42 76 67-78 22-74 73-109-23-85 24Z" fill="url(#dark)" stroke="#7f96a5" stroke-width="5"/>
    <path d="M-121-35-5-84 95-48 46 17-50 32Z" fill="url(#steel)" stroke="#d9e1e5" stroke-width="4"/>
    <path d="M-11-68 28-61 49-28 12-4-35-19Z" fill="#0a1b25" stroke="#3dd4d0" stroke-width="5"/>
    <path d="M-205 25-95 18M150-43 70 5M-36 96l30-67" stroke="#e7a847" stroke-width="6"/>
    <ellipse cx="-157" cy="8" rx="27" ry="13" fill="#3dd4d0" opacity=".9" filter="url(#cyanGlow)"/>
  </g>

  <!-- combat ship -->
  <g transform="translate(800 650)" filter="url(#shadow)">
    <path d="m-250 28 87-105 170-45 196 65 65 82-94 21-77 82-145-18-99 49Z" fill="url(#dark)" stroke="#8299a8" stroke-width="6"/>
    <path d="M-150-61 9-118 144-58 78 29-48 42Z" fill="url(#steel)" stroke="#eef3f5" stroke-width="4"/>
    <path d="M-22-97 42-81 72-34 18-4-55-25Z" fill="#071820" stroke="#3dd4d0" stroke-width="6"/>
    <path d="M-198-38-93 8M174-31 86 4M-127 116-87 28M150 102 88 21" stroke="#e7a847" stroke-width="8"/>
    <path d="M-26-113-3-175h26l18 75M91-67l108-25 6 18-105 40" fill="url(#steel)" stroke="#d9e1e5" stroke-width="4"/>
    <ellipse cx="-199" cy="14" rx="38" ry="16" fill="#3dd4d0" filter="url(#cyanGlow)"/>
  </g>

  <!-- flagship -->
  <g transform="translate(1275 650)" filter="url(#shadow)">
    <path d="m-270 34 95-127 199-60 215 73 72 105-111 27-86 101-167-30-116 58Z" fill="url(#dark)" stroke="#879eac" stroke-width="7"/>
    <path d="M-169-77 25-145l154 65-79 104-151 39Z" fill="url(#steel)" stroke="#f1f5f7" stroke-width="5"/>
    <path d="M-36-122 46-99 88-42 25-4-75-28Z" fill="#071820" stroke="#3dd4d0" stroke-width="7"/>
    <path d="M-235-45-100 15M212-53 88 2M-142 140-91 34M179 127 104 28" stroke="#e7a847" stroke-width="9"/>
    <path d="M-24-143 1-222h32l27 90M94-92l132-36 8 21-130 58M-103-70l-114-38-7 21 111 50" fill="url(#steel)" stroke="#d9e1e5" stroke-width="5"/>
    <ellipse cx="-218" cy="18" rx="48" ry="20" fill="#3dd4d0" filter="url(#cyanGlow)"/>
  </g>

  <!-- portrait -->
  <g transform="translate(1430 565)">
    <path d="M-93 224c4-92 24-151 61-178-25-39-17-97 20-124 42-30 100-12 119 34 13 31 7 66-16 90 42 28 62 87 66 178Z" fill="#142736" stroke="#6d8797" stroke-width="4"/>
    <path d="M-28-37c17-45 73-56 104-20 24 28 21 73-7 98-26 23-66 21-90-4-18-20-21-49-7-74Z" fill="#b6c3c8"/>
    <path d="M-39-8c7-58 86-78 126-30l-9 38-27-22-31 11-28-8Z" fill="#1a2833"/>
    <path d="M-61 89 20 51l87 42 25 131H-85Z" fill="url(#steel)" stroke="#d9e1e5" stroke-width="3"/>
    <path d="M20 51v173M-23 70 20 101l45-31" stroke="#e7a847" stroke-width="6"/>
    <path d="M-5 4h18M44 4h18" stroke="#3b5260" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
