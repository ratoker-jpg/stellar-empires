    <linearGradient id="laser" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#ffffff"/><stop offset=".14" stop-color="#a4ebff"/><stop offset=".6" stop-color="#3dd4d0"/><stop offset="1" stop-color="#3dd4d0" stop-opacity="0"/></linearGradient>
    <radialGradient id="blast" cx="45%" cy="42%" r="58%"><stop stop-color="#ffffff"/><stop offset=".18" stop-color="#fff0b4"/><stop offset=".4" stop-color="#e7a847"/><stop offset=".7" stop-color="#c85b45"/><stop offset="1" stop-color="#8b2418" stop-opacity="0"/></radialGradient>
