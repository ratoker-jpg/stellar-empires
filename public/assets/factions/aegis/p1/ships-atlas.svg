  </g>

  <!-- frigate -->
  <g id="ship-frigate" transform="translate(256 768)" filter="url(#shadow)">
    <path d="m-244 31 88-112 165-49 194 66 68 91-99 25-77 91-145-24-104 52Z" fill="url(#dark)" stroke="#8299a8" stroke-width="7"/>
    <path d="M-148-68 10-125 145-62 78 31-51 49Z" fill="url(#steel)" stroke="#eef3f5" stroke-width="5"/>
    <path d="M-22-103 42-87 75-39 19-7-56-27Z" fill="#071820" stroke="#3dd4d0" stroke-width="7"/>
    <path d="M-202-48-111 8M174-40 91 5M-135 116-89 35M146 108 96 30" stroke="#e7a847" stroke-width="9"/>
    <path d="M-24-123 1-188h27l21 74M90-69l113-32 8 20-111 52" fill="url(#steel)" stroke="#d9e1e5" stroke-width="5"/>
    <ellipse cx="-201" cy="15" rx="40" ry="18" fill="#3dd4d0" filter="url(#glow)"/>
  </g>

  <!-- colony ship -->
  <g id="ship-colony" transform="translate(768 768)" filter="url(#shadow)">
    <path d="m-246 30 88-110 165-52 201 69 74 91-99 27-79 88-151-22-104 53Z" fill="url(#dark)" stroke="#8299a8" stroke-width="7"/>
    <path d="M-148-68 5-126 137-66 78 27-48 49Z" fill="url(#steel)" stroke="#eef3f5" stroke-width="5"/>
    <ellipse cx="33" cy="4" rx="74" ry="58" fill="#283d47" stroke="#d9e1e5" stroke-width="6"/>
    <path d="M-21-104 43-86 74-39 21-8-55-27Z" fill="#071820" stroke="#3dd4d0" stroke-width="7"/>
    <path d="M-203-46-111 9M180-39 102 8M-137 116-89 36M151 108 103 33" stroke="#e7a847" stroke-width="9"/>
    <circle cx="36" cy="7" r="33" fill="#5b7869" stroke="#a7c6b4" stroke-width="5"/>
    <path d="M36-26v66M3 7h66" stroke="#3dd4d0" stroke-width="5" filter="url(#glow)"/>
    <ellipse cx="-202" cy="16" rx="41" ry="18" fill="#3dd4d0" filter="url(#glow)"/>
  </g>

  <!-- recycler -->
  <g id="ship-recycler" transform="translate(1280 768)" filter="url(#shadow)">
    <path d="m-238 31 84-107 158-50 193 64 72 89-94 26-77 88-145-22-101 50Z" fill="url(#dark)" stroke="#8299a8" stroke-width="7"/>
    <path d="M-142-65 7-119 135-61 73 27-49 46Z" fill="url(#steel)" stroke="#eef3f5" stroke-width="5"/>
    <path d="M-21-99 39-84 68-38 17-7-53-25Z" fill="#071820" stroke="#3dd4d0" stroke-width="7"/>
    <path d="M-200-45-112 8M169-37 91 7M-132 111-87 34M143 105 94 30" stroke="#e7a847" stroke-width="9"/>
    <path d="M125-51 229-114M117-16l121-18M104 24l112 34" stroke="#d9e1e5" stroke-width="10" stroke-linecap="round"/>
    <circle cx="118" cy="-17" r="17" fill="#3dd4d0" filter="url(#glow)"/>
    <ellipse cx="-196" cy="15" rx="39" ry="18" fill="#3dd4d0" filter="url(#glow)"/>
  </g>
</svg>
