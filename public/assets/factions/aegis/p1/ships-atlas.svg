<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-label="Корабли вертикального среза Директората Эгида">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f2f6f7"/><stop offset=".34" stop-color="#a9b7c2"/><stop offset=".7" stop-color="#536774"/><stop offset="1" stop-color="#172631"/></linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#364b58"/><stop offset="1" stop-color="#101a22"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity=".72"/></filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="#3dd4d0" stroke-opacity=".035"/></pattern>
  </defs>
  <rect width="1536" height="1024" fill="#02050a"/><rect width="1536" height="1024" fill="url(#grid)"/>
  <g fill="none" stroke="#3e718e" stroke-opacity=".2"><path d="M512 0v1024M1024 0v1024M0 512h1536"/></g>

  <!-- scout -->
  <g id="ship-scout" transform="translate(256 256)" filter="url(#shadow)">
    <path d="m-202 28 72-84 127-36 155 48 72 70-76 22-73 72-112-22-84 40Z" fill="url(#dark)" stroke="#8299a8" stroke-width="6"/>
    <path d="M-118-44-3-88 96-48 47 17-49 35Z" fill="url(#steel)" stroke="#eaf0f3" stroke-width="5"/>
    <path d="M-8-68 31-60 52-29 14-3-38-18Z" fill="#071820" stroke="#3dd4d0" stroke-width="6"/>
    <path d="M-196 23-92 17M150-42 69 3M-36 98l30-66" stroke="#e7a847" stroke-width="7"/>
    <ellipse cx="-159" cy="9" rx="29" ry="14" fill="#3dd4d0" filter="url(#glow)"/>
  </g>

  <!-- small cargo -->
  <g id="ship-cargo" transform="translate(768 256)" filter="url(#shadow)">
    <path d="m-226 24 77-88 135-46 170 55 88 75-80 27-72 78-137-16-96 42Z" fill="url(#dark)" stroke="#8299a8" stroke-width="6"/>
    <rect x="-107" y="-69" width="103" height="127" rx="12" fill="url(#steel)" stroke="#eaf0f3" stroke-width="5" transform="rotate(-11)"/>
    <rect x="15" y="-55" width="91" height="111" rx="11" fill="#768895" stroke="#d9e1e5" stroke-width="5" transform="rotate(8)"/>
    <path d="M-11-77 54-61 83-27 36 0-39-17Z" fill="#071820" stroke="#3dd4d0" stroke-width="6"/>
    <path d="M-177-25-225-72M167-31l58-46M-128 105-89 44M132 102 91 43" stroke="#e7a847" stroke-width="8"/>
    <ellipse cx="-190" cy="12" rx="34" ry="16" fill="#3dd4d0" filter="url(#glow)"/>
  </g>

  <!-- fighter -->
  <g id="ship-fighter" transform="translate(1280 256)" filter="url(#shadow)">
    <path d="m-207 29 79-97 137-43 159 62 62 70-82 22-66 78-120-20-86 48Z" fill="url(#dark)" stroke="#8299a8" stroke-width="6"/>
    <path d="M-116-55 8-104 112-52 56 25-52 42Z" fill="url(#steel)" stroke="#eef3f5" stroke-width="5"/>
    <path d="M-9-84 42-71 69-32 19-4-47-23Z" fill="#071820" stroke="#3dd4d0" stroke-width="6"/>
    <path d="M-161-47-230-91M133-49l82-42M-129 91-190 135M112 91l66 43" stroke="#e7a847" stroke-width="8"/>
    <path d="M20-102 42-154h20l15 56M84-51l99-30 7 19-96 47" fill="url(#steel)" stroke="#d9e1e5" stroke-width="4"/>
