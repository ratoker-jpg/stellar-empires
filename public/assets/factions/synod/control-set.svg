<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Контрольный визуальный набор Машинного Синода">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#070914"/><stop offset=".5" stop-color="#050812"/><stop offset="1" stop-color="#010308"/></linearGradient>
    <linearGradient id="ceramic" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#424b61"/><stop offset=".35" stop-color="#252c3b"/><stop offset=".72" stop-color="#10141d"/><stop offset="1" stop-color="#070910"/></linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#eafbff"/><stop offset=".4" stop-color="#53dcff"/><stop offset="1" stop-color="#8a6dff"/></linearGradient>
    <radialGradient id="planet" cx="38%" cy="30%" r="72%"><stop stop-color="#b2c3d8"/><stop offset=".3" stop-color="#46516a"/><stop offset=".62" stop-color="#181d2a"/><stop offset="1" stop-color="#03050a"/></radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#000" flood-opacity=".8"/></filter>
    <pattern id="grid" width="68" height="68" patternUnits="userSpaceOnUse"><path d="M68 0H0V68" fill="none" stroke="#8a6dff" stroke-opacity=".045"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <g opacity=".13" fill="none" stroke="#53dcff"><circle cx="1280" cy="180" r="480"/><circle cx="1280" cy="180" r="370"/><circle cx="1280" cy="180" r="260"/></g>
  <path d="M0 720C310 520 670 810 1010 590s430-216 590-176v486H0Z" fill="#11152a" opacity=".45"/>
  <g fill="none" stroke="#53dcff" stroke-opacity=".15"><path d="M40 80h1520M40 820h1520"/><path d="M40 80v740M1560 80v740"/></g>
  <text x="58" y="62" fill="#53dcff" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="700" letter-spacing="7">MACHINE SYNOD · CONTROL SET</text>
  <text x="1542" y="62" text-anchor="end" fill="#8273c9" font-family="Inter,Arial,sans-serif" font-size="14" letter-spacing="3">MODULAR / PRECISE / OVERCLOCKED</text>

  <!-- home planet -->
  <g transform="translate(215 250)" filter="url(#shadow)">
    <circle r="128" fill="#8a6dff" opacity=".06"/>
    <circle r="108" fill="url(#planet)" stroke="#53617d" stroke-width="3"/>
    <path d="M-89-48c54-29 108-25 164 14-4 37-18 71-43 102-45 7-83-2-116-27-16-32-18-62-5-89Z" fill="#2c3244" opacity=".88"/>
    <path d="M-60-80c20 52 39 113 55 180M15-103c-5 59-3 124 7 196M77-64C48-17 27 36 16 93" fill="none" stroke="#53dcff" stroke-width="5" stroke-opacity=".72" filter="url(#glow)"/>
    <ellipse rx="137" ry="24" fill="none" stroke="#8a6dff" stroke-width="5" stroke-dasharray="80 20" transform="rotate(18)"/>
  </g>

  <!-- command building -->
  <g transform="translate(555 270)" filter="url(#shadow)">
    <ellipse cy="132" rx="146" ry="31" fill="#000" opacity=".5"/>
    <circle cy="15" r="105" fill="none" stroke="#8a6dff" stroke-width="13" stroke-dasharray="93 22"/>
    <circle cy="15" r="70" fill="none" stroke="#53dcff" stroke-width="8" stroke-dasharray="42 12" filter="url(#glow)"/>
    <path d="M-52 100-71 18-40-66 0-101 40-66 71 18 52 100 0 128Z" fill="url(#ceramic)" stroke="#65708a" stroke-width="4"/>
    <circle cy="15" r="27" fill="#eafbff" stroke="#53dcff" stroke-width="7" filter="url(#glow)"/>
    <path d="M0-101V-148M0 128v37M-105 15h-45M105 15h45" stroke="#53dcff" stroke-width="5"/>
  </g>

  <!-- resource building -->
  <g transform="translate(895 260)" filter="url(#shadow)">
    <ellipse cy="140" rx="138" ry="30" fill="#000" opacity=".5"/>
    <path d="M-112 85-73-76 0-122 73-76l39 161-59 48H-53Z" fill="url(#ceramic)" stroke="#5a657d" stroke-width="4"/>
    <path d="M-65 68-37-54 0-80l37 26L65 68 32 98h-64Z" fill="#090d15" stroke="#8a6dff" stroke-width="6"/>
    <path d="M0-78V96M-53-29l53 27 53-27M-62 57h124" fill="none" stroke="#53dcff" stroke-width="5" filter="url(#glow)"/>
    <circle cy="13" r="20" fill="#eafbff" stroke="#53dcff" stroke-width="5"/>
  </g>

  <!-- defense -->
  <g transform="translate(1250 270)" filter="url(#shadow)">
    <ellipse cy="131" rx="128" ry="28" fill="#000" opacity=".5"/>
    <circle cy="20" r="92" fill="none" stroke="#252c3b" stroke-width="24"/>
    <circle cy="20" r="78" fill="none" stroke="#8a6dff" stroke-width="4" stroke-dasharray="36 12"/>
    <path d="M-40 92-58 16-30-56 0-91 30-56 58 16 40 92 0 116Z" fill="url(#ceramic)" stroke="#69748e" stroke-width="4"/>
    <path d="M0-86 96-139l10 18-83 69" fill="#252c3b" stroke="#53dcff" stroke-width="5"/>
    <circle cy="18" r="16" fill="#eafbff" stroke="#53dcff" stroke-width="5" filter="url(#glow)"/>
  </g>

  <!-- scout -->
  <g transform="translate(305 635)" filter="url(#shadow)">
    <ellipse rx="195" ry="84" fill="none" stroke="#8a6dff" stroke-width="13" stroke-dasharray="110 26" transform="rotate(-12)"/>
    <ellipse rx="132" ry="56" fill="none" stroke="#53dcff" stroke-width="7" stroke-dasharray="58 18" transform="rotate(18)" filter="url(#glow)"/>
    <path d="M-83 33-109-25-52-83 18-98 88-51 111 14 58 72-12 91Z" fill="url(#ceramic)" stroke="#66718a" stroke-width="5"/>
    <circle r="24" fill="#eafbff" stroke="#53dcff" stroke-width="6" filter="url(#glow)"/>
    <path d="M-197 17h61M139-14h75M-19-151v53" stroke="#53dcff" stroke-width="5"/>
  </g>

  <!-- combat ship -->
  <g transform="translate(800 650)" filter="url(#shadow)">
    <ellipse rx="258" ry="105" fill="none" stroke="#8a6dff" stroke-width="17" stroke-dasharray="145 34" transform="rotate(-10)"/>
    <ellipse rx="178" ry="72" fill="none" stroke="#53dcff" stroke-width="9" stroke-dasharray="76 22" transform="rotate(16)" filter="url(#glow)"/>
    <path d="M-130 44-151-48-81-121 17-144 117-82 151 15 79 104-25 126Z" fill="url(#ceramic)" stroke="#6d7891" stroke-width="6"/>
    <path d="M-61-92 17-121 88-73 45-12-35 6-86-35Z" fill="#090d15" stroke="#53dcff" stroke-width="6"/>
    <circle r="31" fill="#eafbff" stroke="#53dcff" stroke-width="8" filter="url(#glow)"/>
    <path d="M-240-62-140-21M211-78 132-25M-142 122-76 65M176 108 91 56" stroke="#8a6dff" stroke-width="9"/>
  </g>

  <!-- flagship -->
  <g transform="translate(1275 650)" filter="url(#shadow)">
    <ellipse rx="292" ry="122" fill="none" stroke="#8a6dff" stroke-width="21" stroke-dasharray="170 40" transform="rotate(-9)"/>
    <ellipse rx="215" ry="88" fill="none" stroke="#53dcff" stroke-width="11" stroke-dasharray="90 24" transform="rotate(15)" filter="url(#glow)"/>
    <path d="M-160 48-181-61-91-151 27-178 144-98 184 20 96 126-39 151Z" fill="url(#ceramic)" stroke="#758099" stroke-width="7"/>
    <path d="M-77-119 26-153 113-89 59-13-49 9-113-47Z" fill="#090d15" stroke="#53dcff" stroke-width="7"/>
    <circle r="40" fill="#eafbff" stroke="#53dcff" stroke-width="10" filter="url(#glow)"/>
    <path d="M-285-72-168-26M260-92 165-30M-173 151-89 75M217 136 111 67M15-258v80" stroke="#8a6dff" stroke-width="11"/>
  </g>

  <!-- portrait -->
  <g transform="translate(1430 560)">
    <path d="M-102 228c5-95 32-157 79-185-26-39-22-95 11-126 38-35 100-29 130 13 25 35 21 81-10 112 49 29 76 91 80 186Z" fill="#0b0e17" stroke="#48536b" stroke-width="5"/>
    <path d="M-35-57c38-36 102-20 117 31 11 37-11 78-50 89-38 11-78-11-89-49-8-26 1-53 22-71Z" fill="url(#ceramic)" stroke="#8a6dff" stroke-width="4"/>
    <path d="M-45-14 2-48l53 14 31 43-29 33-59 5-45-27Z" fill="#080b12" stroke="#53dcff" stroke-width="5"/>
    <circle cx="-5" cy="0" r="8" fill="#eafbff" filter="url(#glow)"/><circle cx="47" cy="0" r="8" fill="#eafbff" filter="url(#glow)"/>
    <path d="M-72 103 22 53l99 51 34 124H-105Z" fill="url(#ceramic)" stroke="#59647d" stroke-width="4"/>
    <path d="M22 53v175M-35 86 22 118l59-32" stroke="#53dcff" stroke-width="6"/>
  </g>
</svg>
