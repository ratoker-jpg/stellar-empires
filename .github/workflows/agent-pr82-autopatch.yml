name: Agent PR82 bot time autopatch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/pr82-bot-time-contract
          fetch-depth: 0
      - name: Setup Node 22.12
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
      - name: Apply implementation patch
        shell: bash
        run: |
          base64 --decode tools/pr82.patch.gz.b64 | gzip --decompress > /tmp/pr82.patch
          git apply -p1 /tmp/pr82.patch
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Validate full repository gate
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee pr82-validation.log
      - name: Upload validation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr82-validation
          path: pr82-validation.log
          retention-days: 1
      - name: Remove temporary files
        run: rm -f tools/pr82.patch.gz.b64 .github/workflows/agent-pr82-autopatch.yml .github/workflows/agent-pr82-source-export.yml package-lock.json pr82-validation.log /tmp/pr82.patch
      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: stabilize bot simulation time"
          git push origin HEAD:agent/pr82-bot-time-contract
