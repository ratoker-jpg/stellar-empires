name: Diagnose PR74 TypeScript

on:
  push:
    branches:
      - agent/pr74-fleet-doctrine

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
      - run: npm install --no-audit --no-fund
      - name: Capture typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          echo $? > typecheck-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr74-typecheck-diagnostic
          path: |
            typecheck.log
            typecheck-exit-code.txt
          if-no-files-found: error
