name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Capture typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          echo $? > typecheck-exit-code.txt
          exit 0

      - name: Upload typecheck diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr74-typecheck-diagnostic
          path: |
            typecheck.log
            typecheck-exit-code.txt
          if-no-files-found: error

      - name: Enforce typecheck result
        shell: bash
        run: exit "$(cat typecheck-exit-code.txt)"

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
