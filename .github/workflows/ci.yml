name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint > eslint.log 2>&1

      - name: Upload lint diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: eslint-log
          path: eslint.log

      - name: Fail when lint fails
        if: steps.lint.outcome == 'failure'
        run: exit 1

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
