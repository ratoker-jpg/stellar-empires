name: Apply PR77 assets

on:
  push:
    branches:
      - agent/pr77-full-aegis-catalog

permissions:
  contents: write

jobs:
  assets:
    if: ${{ !contains(github.event.head_commit.message, '[pr77-assets]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/pr77-full-aegis-catalog
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
      - run: node tools/pr77_assets.mjs
      - run: |
          git config user.name "stellar-empires-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src tests
          git commit -m "fix: register extended Aegis building assets [pr77-assets]"
          git push origin HEAD:agent/pr77-full-aegis-catalog
