name: PR80 Diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/pr80-native-synod-catalog
      - name: Clean duplicated imports
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          for file in Path('src').rglob('*.ts'):
              lines = file.read_text().splitlines()
              cleaned: list[str] = []
              for line in lines:
                  if line.startswith('import ') and cleaned and cleaned[-1] == line:
                      continue
                  cleaned.append(line)
              file.write_text('\n'.join(cleaned) + '\n')
          PY
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src
            git commit -m "Clean temporary patch duplication [pr80-cleanup]"
            git push origin HEAD:agent/pr80-native-synod-catalog
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
      - run: npm install --no-audit --no-fund
      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          npm run lint > lint.log 2>&1
          echo "$?" > lint-status.txt
          npm run typecheck > typecheck.log 2>&1
          echo "$?" > typecheck-status.txt
          npm test -- --run > test.log 2>&1
          echo "$?" > test-status.txt
          npm run build > build.log 2>&1
          echo "$?" > build-status.txt
          grep -RInE "AEGIS_|ship\.aegis\.(scout|recycler|colony)|building\.aegis\.|technology\.aegis\." src tests > hardcodes.log 2>&1
          exit 0
      - uses: actions/upload-artifact@v6
        with:
          name: pr80-diagnostics
          path: |
            lint.log
            lint-status.txt
            typecheck.log
            typecheck-status.txt
            test.log
            test-status.txt
            build.log
            build-status.txt
            hardcodes.log
          if-no-files-found: error
