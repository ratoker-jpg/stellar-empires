name: Agent PR81 native Veyra autopatch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/pr81-native-veyra
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply native Veyra patch
        run: python tools/agent_pr81_native_veyra.py
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Validate
        run: npm run check 2>&1 | tee pr81-validation.log
      - name: Upload validation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr81-validation
          path: pr81-validation.log
          retention-days: 1
      - name: Remove temporary automation
        run: rm tools/agent_pr81_native_veyra.py .github/workflows/agent-pr81-autopatch.yml pr81-validation.log
      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add native Veyra mechanical catalog"
          git push origin HEAD:agent/pr81-native-veyra
