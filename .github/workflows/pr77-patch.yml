name: Apply PR77 patch

on:
  push:
    branches:
      - agent/pr77-full-aegis-catalog

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[pr77-patched]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/pr77-full-aegis-catalog
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
      - run: node tools/pr77_patch.mjs
      - name: Commit patch
        shell: bash
        run: |
          git config user.name "stellar-empires-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src tests docs
          git commit -m "feat: complete Aegis mechanical catalog [pr77-patched]"
          git push origin HEAD:agent/pr77-full-aegis-catalog
