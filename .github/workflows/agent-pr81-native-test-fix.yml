name: Agent PR81 native test fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/pr81-native-veyra
          fetch-depth: 0
      - name: Setup Node 22.12
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
      - name: Apply native test fixes
        run: python tools/agent_pr81_native_test_fix.py
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Validate full repository gate
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee pr81-final-validation.log
      - name: Remove temporary files
        run: rm -f tools/agent_pr81_native_test_fix.py .github/workflows/agent-pr81-native-test-fix.yml .github/workflows/agent-pr81-test-diagnostic.yml package-lock.json pr81-final-validation.log
      - name: Commit final test fixtures
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: align bot fixtures with native Veyra IDs"
          git push origin HEAD:agent/pr81-native-veyra
