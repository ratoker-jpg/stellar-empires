name: Apply PR75 patch

on:
  push:
    branches:
      - agent/pr75-command-doctrine-flagships

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[pr75-patched]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/pr75-command-doctrine-flagships
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
      - run: node tools/pr75_patch.mjs
      - name: Commit patch
        shell: bash
        run: |
          git config user.name "stellar-empires-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src tests docs
          git commit -m "feat: complete command doctrine and flagship framework [pr75-patched]"
          git push origin HEAD:agent/pr75-command-doctrine-flagships
