name: PR80 UI Autopatch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/pr80-native-synod-catalog
      - name: Apply remaining faction-aware patches
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def edit(path: str, replacements: list[tuple[str, str]]) -> None:
              file = Path(path)
              text = file.read_text()
              for old, new in replacements:
                  if old in text:
                      text = text.replace(old, new)
                  elif new not in text:
                      raise SystemExit(f'missing replacement in {path}: {old[:100]!r}')
              file.write_text(text)

          edit('src/ui/fleetComposerViewModel.ts', [
              ("import type { ResourceCost } from '../simulation/economy/types';", "import type { ResourceCost } from '../simulation/economy/types';\nimport { getResearchEffectsForEmpire } from '../simulation/factions/factionResearchEffects';"),
              ("import { AEGIS_RESEARCH_CATALOG } from '../simulation/research/catalog';\nimport { calculateResearchEffects } from '../simulation/research/progression';\nimport { getEmpireResearch } from '../simulation/research/researchState';\n", ""),
              ("function getFleetSpeedBonus(state: GameState, empireId: string): number {\n  const research = getEmpireResearch(state.research, empireId);\n  return research === undefined\n    ? 0\n    : calculateResearchEffects(research, AEGIS_RESEARCH_CATALOG).fleetSpeedPercent;\n}", "function getFleetSpeedBonus(state: GameState, empireId: string): number {\n  return getResearchEffectsForEmpire(state, empireId).fleetSpeedPercent;\n}"),
          ])

          edit('src/ui/expeditionPanel.ts', [
              ("import { estimateFlightToGalaxyPlanet } from '../simulation/fleets/flightCalculations';", "import { getResearchEffectsForEmpire } from '../simulation/factions/factionResearchEffects';\nimport { estimateFlightToGalaxyPlanet } from '../simulation/fleets/flightCalculations';"),
              ("import { AEGIS_RESEARCH_CATALOG } from '../simulation/research/catalog';\nimport { calculateResearchEffects } from '../simulation/research/progression';\nimport { getEmpireResearch } from '../simulation/research/researchState';\n", ""),
              ("import type { GameCommand, GameState } from '../simulation/types';", "import type { GameCommand, GameState } from '../simulation/types';\nimport { getShipCountByRole, hasShipRole } from '../simulation/units/shipCapabilities';"),
              ("function fleetSpeedBonus(state: GameState, empireId: string): number {\n  const research = getEmpireResearch(state.research, empireId);\n  return research === undefined\n    ? 0\n    : calculateResearchEffects(research, AEGIS_RESEARCH_CATALOG).fleetSpeedPercent;\n}", "function fleetSpeedBonus(state: GameState, empireId: string): number {\n  return getResearchEffectsForEmpire(state, empireId).fleetSpeedPercent;\n}"),
              ("        (fleet.ships['ship.aegis.scout'] ?? 0) > 0,", "        hasShipRole(fleet.ships, 'scout'),"),
              ("option.textContent = `${fleet.id} · скорость ${fleet.speed} · разведчиков ${fleet.ships['ship.aegis.scout'] ?? 0}`;", "option.textContent = `${fleet.id} · скорость ${fleet.speed} · разведчиков ${getShipCountByRole(fleet.ships, 'scout')}`;"),
          ])

          edit('src/ui/missionScreen.ts', [
              ("import { getUnitDefinition } from '../simulation/units/catalog';", "import { getUnitDefinition } from '../simulation/units/catalog';\nimport { hasShipRole } from '../simulation/units/shipCapabilities';"),
              ("if ((fleet.ships['ship.aegis.colony'] ?? 0) > 0)", "if (hasShipRole(fleet.ships, 'colonizer'))"),
          ])

          edit('src/ui/planetScreen.ts', [
              ("import type { AegisVerticalSliceAsset } from '../assets/aegisVerticalSliceAssets';", "import type { AegisVerticalSliceAsset } from '../assets/aegisVerticalSliceAssets';\nimport { getFactionMechanicalRoles } from '../simulation/factions/factionMechanicalRoles';"),
              ("const commandLevel = getBuildingLevel(planet.buildings, 'building.aegis.command');", "const commandLevel = getBuildingLevel(\n    planet.buildings,\n    getFactionMechanicalRoles(planet.factionId).buildings.command,\n  );"),
          ])

          edit('src/ui/developmentPresentation.ts', [
              ("import { getUnitsByKind } from '../simulation/units/catalog';", "import { getFactionMechanicalRoles } from '../simulation/factions/factionMechanicalRoles';\nimport { getUnitsByKind } from '../simulation/units/catalog';"),
              ("  dialog.style.setProperty(\n    '--research-facility-art',\n    `url(\"${getBuildingSheetUrl(planet.factionId, 'building.aegis.research-lab')}\")`,", "  const roles = getFactionMechanicalRoles(planet.factionId).buildings;\n  dialog.style.setProperty(\n    '--research-facility-art',\n    `url(\"${getBuildingSheetUrl(planet.factionId, roles.laboratory)}\")`,"),
              ("        kind === 'ship' ? 'building.aegis.shipyard' : 'building.aegis.sensor-array',", "        kind === 'ship'\n          ? getFactionMechanicalRoles(planet.factionId).buildings.shipyard\n          : getFactionMechanicalRoles(planet.factionId).buildings.sensorGrid,"),
              ("    const definitions = getUnitsByKind(kind);", "    const definitions = getUnitsByKind(kind, planet.factionId);"),
          ])

          edit('src/simulation/upgrades/shipUpgrades.ts', [
              ("import { canUseMechanicalDefinition } from '../factions/sharedMechanicalCatalog';", "import { getFactionMechanicalRoles } from '../factions/factionMechanicalRoles';\nimport { canUseMechanicalDefinition } from '../factions/sharedMechanicalCatalog';"),
              ("getBuildingLevel(planet.buildings, 'building.aegis.shipyard')", "getBuildingLevel(\n      planet.buildings,\n      getFactionMechanicalRoles(planet.factionId).buildings.shipyard,\n    )"),
          ])

          edit('src/assets/galaxyFleetRuntimeAssets.ts', [
              ("import type { FactionId } from '../simulation/planet/types';", "import type { FactionId } from '../simulation/planet/types';\nimport { getUnitDefinition } from '../simulation/units/catalog';"),
              ("export function getFleetShipPresentationRole(unitId: string): FleetShipPresentationRole {\n  if (unitId.endsWith('.scout')) return 'scout';\n  if (unitId.endsWith('.cargo')) return 'cargo';\n  if (unitId.endsWith('.frigate')) return 'frigate';\n  if (unitId.endsWith('.colony')) return 'colony';\n  if (unitId.endsWith('.recycler')) return 'recycler';\n  return 'fighter';\n}", "export function getFleetShipPresentationRole(unitId: string): FleetShipPresentationRole {\n  switch (getUnitDefinition(unitId)?.role) {\n    case 'scout': return 'scout';\n    case 'transport': return 'cargo';\n    case 'frigate': return 'frigate';\n    case 'colonizer': return 'colony';\n    case 'recycler': return 'recycler';\n    default: return 'fighter';\n  }\n}"),
          ])
          PY
      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "Finish faction-aware Synod UI and shared systems [pr80-autopatch]"
          git push origin HEAD:agent/pr80-native-synod-catalog
