name: PR80 Autopatch

on:
  push:
    branches:
      - agent/pr80-native-synod-catalog

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[pr80-autopatch]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/pr80-native-synod-catalog
      - name: Apply focused runtime patches
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'missing replacement in {path}: {old[:100]!r}')
              file.write_text(text.replace(old, new))

          replace(
              'src/simulation/reducer.ts',
              "import { canUseMechanicalDefinition } from './factions/sharedMechanicalCatalog';",
              "import { getEnergyOutputByEmpire, getResearchEffectsForEmpire } from './factions/factionResearchEffects';\nimport { canUseMechanicalDefinition } from './factions/sharedMechanicalCatalog';",
          )
          replace(
              'src/simulation/reducer.ts',
              "import { AEGIS_RESEARCH_CATALOG } from './research/catalog';\nimport { applySpeedPercent, calculateResearchEffects } from './research/progression';",
              "import { applySpeedPercent } from './research/progression';",
          )
          replace(
              'src/simulation/reducer.ts',
              "import { getEmpireResearch } from './research/researchState';\n",
              "",
          )
          replace(
              'src/simulation/reducer.ts',
              "function getResearchEffectsForEmpire(state: GameState, empireId: string) {\n  const research = getEmpireResearch(state.research, empireId);\n  return research === undefined\n    ? undefined\n    : calculateResearchEffects(research, AEGIS_RESEARCH_CATALOG);\n}\n\nfunction getEnergyOutputByEmpire(state: GameState): Readonly<Record<string, number>> {\n  return Object.fromEntries(\n    state.research.map((research) => [\n      research.empireId,\n      calculateResearchEffects(research, AEGIS_RESEARCH_CATALOG).energyOutputPercent,\n    ]),\n  );\n}\n\n",
              "",
          )

          replace(
              'src/simulation/combat/resolveAttackMission.ts',
              "import type { ResourceCost } from '../economy/types';",
              "import type { ResourceCost } from '../economy/types';\nimport { getResearchEffectsForEmpire } from '../factions/factionResearchEffects';",
          )
          replace(
              'src/simulation/combat/resolveAttackMission.ts',
              "import { AEGIS_RESEARCH_CATALOG } from '../research/catalog';\nimport { calculateResearchEffects } from '../research/progression';\nimport { getEmpireResearch } from '../research/researchState';\n",
              "",
          )
          replace(
              'src/simulation/combat/resolveAttackMission.ts',
              "  const research = getEmpireResearch(state.research, empireId);\n  const effects =\n    research === undefined\n      ? undefined\n      : calculateResearchEffects(research, AEGIS_RESEARCH_CATALOG);",
              "  const effects = getResearchEffectsForEmpire(state, empireId);",
          )
          replace(
              'src/simulation/combat/resolveAttackMission.ts',
              "(effects?.weaponStrengthPercent ?? 0)",
              "effects.weaponStrengthPercent",
          )
          replace(
              'src/simulation/combat/resolveAttackMission.ts',
              "(effects?.armorStrengthPercent ?? 0)",
              "effects.armorStrengthPercent",
          )

          path = Path('src/simulation/pve/spaceObjects.ts')
          text = path.read_text()
          text = text.replace(
              "import { enqueueEvent } from '../eventQueue';",
              "import { enqueueEvent } from '../eventQueue';\nimport { getFactionMechanicalRoles } from '../factions/factionMechanicalRoles';\nimport { getResearchEffectsForEmpire } from '../factions/factionResearchEffects';",
          )
          text = text.replace(
              "import type { PlanetState } from '../planet/types';",
              "import type { FactionId, PlanetState } from '../planet/types';",
          )
          text = text.replace(
              "import { AEGIS_RESEARCH_CATALOG } from '../research/catalog';\nimport { calculateResearchEffects } from '../research/progression';\nimport { getEmpireResearch } from '../research/researchState';\n",
              "",
          )
          text = text.replace(
              "import { calculatePveRewardMultiplier } from './pveBalance';",
              "import { findShipIdByRole } from '../units/shipCapabilities';\nimport type { ShipRole } from '../units/types';\nimport { calculatePveRewardMultiplier } from './pveBalance';",
          )
          text = text.replace(
              "const REQUIRED_SHIP_BY_KIND: Readonly<Record<SpaceObjectKind, string>> = {\n  asteroid: 'ship.aegis.recycler',\n  'gas-cloud': 'ship.aegis.cargo',\n  anomaly: 'ship.aegis.scout',\n};",
              "const REQUIRED_SHIP_ROLE_BY_KIND: Readonly<Record<SpaceObjectKind, ShipRole>> = {\n  asteroid: 'recycler',\n  'gas-cloud': 'transport',\n  anomaly: 'scout',\n};",
          )
          text = text.replace(
              "function getFleetSpeedBonus(state: GameState, empireId: string): number {\n  const research = getEmpireResearch(state.research, empireId);\n  return research === undefined\n    ? 0\n    : calculateResearchEffects(research, AEGIS_RESEARCH_CATALOG).fleetSpeedPercent;\n}",
              "function getFleetSpeedBonus(state: GameState, empireId: string): number {\n  return getResearchEffectsForEmpire(state, empireId).fleetSpeedPercent;\n}",
          )
          text = text.replace(
              "export function getRequiredSpaceObjectShipId(kind: SpaceObjectKind): string {\n  return REQUIRED_SHIP_BY_KIND[kind];\n}",
              "export function getRequiredSpaceObjectShipId(\n  kind: SpaceObjectKind,\n  factionId: FactionId = 'aegis',\n): string {\n  const ships = getFactionMechanicalRoles(factionId).ships;\n  switch (REQUIRED_SHIP_ROLE_BY_KIND[kind]) {\n    case 'recycler': return ships.recycler;\n    case 'transport': return ships.transport;\n    case 'scout': return ships.scout;\n    default: throw new Error(`Unsupported space object ship role: ${REQUIRED_SHIP_ROLE_BY_KIND[kind]}`);\n  }\n}",
          )
          text = text.replace(
              "  resolvesAt: number,\n): SpaceObjectMissionReport {",
              "  resolvesAt: number,\n  specialistShipId: string,\n): SpaceObjectMissionReport {",
          )
          text = text.replace(
              "  const requiredShipId = getRequiredSpaceObjectShipId(object.kind);\n  const losses = Math.floor(roll / 19) % 1_000 < effectiveHazard\n    ? { [requiredShipId]: 1 }",
              "  const losses = Math.floor(roll / 19) % 1_000 < effectiveHazard\n    ? { [specialistShipId]: 1 }",
          )
          text = text.replace(
              "  const requiredShipId = getRequiredSpaceObjectShipId(object.kind);\n  if ((fleet.ships[requiredShipId] ?? 0) <= 0) {",
              "  const requiredRole = REQUIRED_SHIP_ROLE_BY_KIND[object.kind];\n  const requiredShipId = findShipIdByRole(fleet.ships, requiredRole);\n  if (requiredShipId === undefined) {",
          )
          text = text.replace(
              "      message: `Mission requires ${requiredShipId}.`,\n      details: { requiredShipId, kind: object.kind },",
              "      message: `Mission requires a ${requiredRole} hull.`,\n      details: { requiredRole, kind: object.kind },",
          )
          text = text.replace(
              "  const report = createMissionReport(state, fleet, object, origin.id, resolvesAt);",
              "  const report = createMissionReport(\n    state,\n    fleet,\n    object,\n    origin.id,\n    resolvesAt,\n    requiredShipId,\n  );",
          )
          path.write_text(text)

          replace(
              'tests/simulation/synodNativeCatalog.test.ts',
              "{ buildingId: 'building.synod.cognition-vault', level: 4 },",
              "{ buildingId: 'building.synod.cognition-vault', level: 5 },",
          )
          PY
      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests
          git commit -m "Fix faction-aware shared runtime paths [pr80-autopatch]"
          git push origin HEAD:agent/pr80-native-synod-catalog
