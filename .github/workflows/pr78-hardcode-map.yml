name: Map PR78 hardcodes

on:
  push:
    branches:
      - agent/pr78-native-synod-catalog

permissions:
  contents: read

jobs:
  map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Capture mechanical hardcodes
        shell: bash
        run: |
          set +e
          grep -RInE "AEGIS_(BUILDING|RESEARCH|UNIT)_CATALOG|building\.aegis|technology\.aegis" src/simulation src/ui > pr78-hardcodes.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr78-hardcode-map
          path: pr78-hardcodes.txt
          if-no-files-found: error
