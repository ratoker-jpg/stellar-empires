name: Diagnose TypeScript

on:
  workflow_dispatch:
  push:
    branches:
      - agent/pr73-ship-upgrades

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture typecheck output
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          echo $? > typecheck-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostic
          path: |
            typecheck.log
            typecheck-exit-code.txt
          if-no-files-found: error
